<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendHive Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="shortcut icon" href="https://www.marketcentral.in/customerFiles/90484/Logos/IMG-20241126-WA0032.jpg" type="image/x-icon">
    <style>
        body {
            background-color: white;
            font-weight: bold;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-control {
            margin-bottom: 10px;
        }
        .header-container {
            background-color: rgb(210, 111, 30);
            padding: 20px;
            text-align: center;
            color: white;
        }
        .header-container img {
            height: 100px;
            width: 150px;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <img src="https://www.marketcentral.in/customerFiles/90484/Logos/scaledLogo/customerLogo.jpg" alt="Logo">
        <h1>TrendHIVE</h1>
    </div>

    <div class="login-container">
        <h2>TrendHIVE Login</h2>
        <form>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
